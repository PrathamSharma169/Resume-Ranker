ai_usage_summary: |
  Used Gemini and Claude for architectural discussion, code structure design, and implementing 
  the modular ranking pipeline. No candidate data was shared with external LLMs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A modular multi-stage candidate intelligence engine. Processes 100K candidates 
  through a memory-efficient generator stream. Uses progressive filtering: 
  Stage 1 applies cheap heuristics to reduce candidates to 15K; Stage 2 applies 
  semantic similarities, evidence matrices, profile authenticity scores, career 
  narratives, behavioral signals, and recruitability/availability factors. 
  Deterministic explanations are generated from feature traces. Runtime is 
  optimized with a Top-K heap for O(N log K) time and O(K) memory.

